<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E8"/>
      <stop offset="1" stop-color="#E2CDB0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="350" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAD9C4"/>
      <stop offset="1" stop-color="#D4BB99"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F4ED"/>
      <stop offset="1" stop-color="#EFE5D4"/>
    </linearGradient>
    <linearGradient id="sofa" x1="200" y1="330" x2="200" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A7D6E"/>
      <stop offset="1" stop-color="#2A5F55"/>
    </linearGradient>
    <linearGradient id="rug" x1="160" y1="0" x2="640" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C09070"/>
      <stop offset="1" stop-color="#A87550"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Wall -->
  <rect x="0" y="0" width="780" height="390" fill="url(#wall)"/>
  <!-- Floor -->
  <rect x="0" y="390" width="780" height="240" fill="url(#floor)"/>
  <!-- Baseboard -->
  <rect x="0" y="385" width="780" height="8" fill="#C8A87A"/>

  <!-- Floor plan grid lines on wall (subtle) -->
  <line x1="0" y1="100" x2="780" y2="100" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="0" y1="200" x2="780" y2="200" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="0" y1="300" x2="780" y2="300" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="130" y1="0" x2="130" y2="390" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="260" y1="0" x2="260" y2="390" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="390" y1="0" x2="390" y2="390" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="520" y1="0" x2="520" y2="390" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>
  <line x1="650" y1="0" x2="650" y2="390" stroke="#E0D0BB" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Large window -->
  <rect x="430" y="60" width="240" height="200" rx="4" fill="#D4ECF2" opacity="0.7" stroke="#B8CCCF" stroke-width="3"/>
  <line x1="550" y1="60" x2="550" y2="260" stroke="#B8CCCF" stroke-width="2"/>
  <line x1="430" y1="160" x2="670" y2="160" stroke="#B8CCCF" stroke-width="2"/>
  <!-- Window light -->
  <rect x="433" y="63" width="115" height="95" fill="white" opacity="0.25"/>

  <!-- Curtain left -->
  <path d="M415 50 Q420 155 415 260" stroke="#C8A87A" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Curtain right -->
  <path d="M685 50 Q680 155 685 260" stroke="#C8A87A" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Area rug -->
  <ellipse cx="370" cy="455" rx="240" ry="70" fill="url(#rug)" opacity="0.85"/>
  <ellipse cx="370" cy="455" rx="220" ry="60" fill="none" stroke="#8A5A35" stroke-width="2" opacity="0.4"/>
  <ellipse cx="370" cy="455" rx="190" ry="50" fill="none" stroke="#8A5A35" stroke-width="1.5" opacity="0.3"/>

  <!-- Sofa body -->
  <rect x="140" y="360" width="440" height="90" rx="12" fill="url(#sofa)"/>
  <!-- Sofa back -->
  <rect x="140" y="320" width="440" height="50" rx="10" fill="#2A5F55"/>
  <!-- Sofa cushions -->
  <rect x="155" y="362" width="130" height="80" rx="8" fill="#3D8070" stroke="#2A5F55" stroke-width="1"/>
  <rect x="300" y="362" width="130" height="80" rx="8" fill="#3D8070" stroke="#2A5F55" stroke-width="1"/>
  <rect x="445" y="362" width="120" height="80" rx="8" fill="#3D8070" stroke="#2A5F55" stroke-width="1"/>
  <!-- Sofa arms -->
  <rect x="130" y="330" width="25" height="120" rx="10" fill="#2A5F55"/>
  <rect x="565" y="330" width="25" height="120" rx="10" fill="#2A5F55"/>
  <!-- Sofa legs -->
  <rect x="152" y="448" width="16" height="20" rx="4" fill="#1E4840"/>
  <rect x="350" y="448" width="16" height="20" rx="4" fill="#1E4840"/>
  <rect x="555" y="448" width="16" height="20" rx="4" fill="#1E4840"/>

  <!-- Throw pillow -->
  <rect x="455" y="330" width="65" height="65" rx="8" fill="#E8CFA0" transform="rotate(-8 488 363)"/>
  <rect x="180" y="330" width="55" height="55" rx="8" fill="#D4A87A" transform="rotate(6 208 358)"/>

  <!-- Coffee table -->
  <rect x="200" y="472" width="200" height="90" rx="8" fill="#C8A87A"/>
  <rect x="206" y="472" width="188" height="8" rx="4" fill="#D4B88E"/>
  <!-- Table legs -->
  <rect x="212" y="550" width="14" height="28" rx="4" fill="#A07850"/>
  <rect x="374" y="550" width="14" height="28" rx="4" fill="#A07850"/>
  <!-- Book on table -->
  <rect x="240" y="460" width="60" height="12" rx="2" fill="#E87B5A" transform="rotate(-3 270 466)"/>
  <!-- Tray on table -->
  <ellipse cx="330" cy="470" rx="35" ry="8" fill="#B89068"/>
  <!-- Candle on tray -->
  <rect x="323" y="448" width="12" height="22" rx="3" fill="#F0E8D8"/>
  <rect x="327" y="443" width="4" height="8" rx="2" fill="#C89068"/>

  <!-- Side table right -->
  <rect x="598" y="390" width="70" height="60" rx="6" fill="#C8A87A"/>
  <rect x="598" y="446" width="70" height="6" rx="3" fill="#A07850"/>
  <!-- Lamp on side table -->
  <rect x="625" y="290" width="14" height="100" rx="3" fill="#8A7060"/>
  <ellipse cx="632" cy="285" rx="35" ry="22" fill="#F0E8D0" opacity="0.9"/>
  <ellipse cx="632" cy="285" rx="35" ry="22" fill="none" stroke="#C8A87A" stroke-width="2"/>
  <!-- Lamp light glow -->
  <ellipse cx="632" cy="295" rx="28" ry="16" fill="#FFF8E8" opacity="0.4"/>

  <!-- Plant left -->
  <rect x="58" y="420" width="32" height="48" rx="6" fill="#8B6A3A"/>
  <!-- Plant leaves -->
  <ellipse cx="74" cy="395" rx="18" ry="35" fill="#3D7A4A" transform="rotate(-15 74 395)"/>
  <ellipse cx="74" cy="395" rx="18" ry="35" fill="#4A8F55" transform="rotate(10 74 395)"/>
  <ellipse cx="60" cy="410" rx="14" ry="28" fill="#3D7A4A" transform="rotate(-30 60 410)"/>

  <!-- Measurement arrows on floor -->
  <line x1="70" y1="490" x2="680" y2="490" stroke="#1F7A6D" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
  <polygon points="70,486 70,494 58,490" fill="#1F7A6D" opacity="0.7"/>
  <polygon points="680,486 680,494 692,490" fill="#1F7A6D" opacity="0.7"/>

  <!-- Right side text panel -->
  <rect x="820" y="0" width="380" height="630" fill="#FFFBF5"/>
  <rect x="820" y="0" width="6" height="630" fill="#1F7A6D"/>

  <!-- Decorative corner accent -->
  <circle cx="1160" cy="80" r="60" fill="#F4EFE6" opacity="0.6"/>
  <circle cx="1160" cy="80" r="40" fill="none" stroke="#C8A87A" stroke-width="1.5" opacity="0.5"/>

  <!-- Tag / category label -->
  <rect x="855" y="80" width="130" height="32" rx="16" fill="#E8F4F1"/>
  <text x="920" y="101" fill="#1F7A6D" font-family="Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Layout Guide</text>

  <!-- Main title -->
  <text x="855" y="170" fill="#1F7A6D" font-family="Arial, sans-serif" font-size="44" font-weight="700">How to Plan</text>
  <text x="855" y="224" fill="#1F7A6D" font-family="Arial, sans-serif" font-size="44" font-weight="700">a Living Room</text>
  <text x="855" y="278" fill="#2B241F" font-family="Arial, sans-serif" font-size="44" font-weight="700">Layout</text>

  <!-- Subtitle line -->
  <rect x="855" y="300" width="60" height="4" rx="2" fill="#C8A87A"/>

  <!-- Excerpt -->
  <text x="855" y="340" fill="#6C5F55" font-family="Arial, sans-serif" font-size="22">Use a practical 5-step</text>
  <text x="855" y="368" fill="#6C5F55" font-family="Arial, sans-serif" font-size="22">method to place seating,</text>
  <text x="855" y="396" fill="#6C5F55" font-family="Arial, sans-serif" font-size="22">rugs, and pathways so</text>
  <text x="855" y="424" fill="#6C5F55" font-family="Arial, sans-serif" font-size="22">your room flows.</text>

  <!-- Tags -->
  <rect x="855" y="480" width="110" height="28" rx="14" fill="#F4EFE6" stroke="#C8A87A" stroke-width="1"/>
  <text x="910" y="499" fill="#6C5F55" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">Living Room</text>
  <rect x="975" y="480" width="80" height="28" rx="14" fill="#F4EFE6" stroke="#C8A87A" stroke-width="1"/>
  <text x="1015" y="499" fill="#6C5F55" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">Layout</text>
  <rect x="1065" y="480" width="110" height="28" rx="14" fill="#F4EFE6" stroke="#C8A87A" stroke-width="1"/>
  <text x="1120" y="499" fill="#6C5F55" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">Small Spaces</text>

  <!-- Branding -->
  <text x="855" y="570" fill="#1F7A6D" font-family="Arial, sans-serif" font-size="22" font-weight="600">At Home Plans</text>
  <text x="855" y="598" fill="#A0948A" font-family="Arial, sans-serif" font-size="16">athomeplans.com</text>
</svg>
