<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F0E6"/>
      <stop offset="1" stop-color="#E0CAA8"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EF"/>
      <stop offset="1" stop-color="#EDE3D0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="420" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8C4A4"/>
      <stop offset="1" stop-color="#C4A880"/>
    </linearGradient>
    <linearGradient id="sofa" x1="100" y1="350" x2="100" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8956A"/>
      <stop offset="1" stop-color="#A87050"/>
