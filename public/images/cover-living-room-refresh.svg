  <!-- Description -->
  <text x="855" y="308" fill="#6C5F55" font-family="Arial, sans-serif" font-size="21">Warm up your living</text>
  <text x="855" y="336" fill="#6C5F55" font-family="Arial, sans-serif" font-size="21">space with furniture</text>
  <text x="855" y="364" fill="#6C5F55" font-family="Arial, sans-serif" font-size="21">placement, layered</text>
  <text x="855" y="392" fill="#6C5F55" font-family="Arial, sans-serif" font-size="21">lighting &amp; soft textiles.</text>

