    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A6840"/>
      <stop offset="1" stop-color="#6A4C28"/>
    </linearGradient>
    <radialGradient id="sunlight" cx="0.62" cy="0" r="0.7" gradientUnits="objectBoundingBox">
      <stop stop-color="#FFFCE8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#F6F0E6" stop-opacity="0"/>
