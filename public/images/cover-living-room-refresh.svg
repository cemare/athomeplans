  <!-- Main title -->
  <text x="855" y="178" fill="#1F7A6D" font-family="Arial, sans-serif" font-size="52" font-weight="700">Living Room</text>
  <text x="855" y="238" fill="#2B241F" font-family="Arial, sans-serif" font-size="52" font-weight="700">Refresh</text>

